<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16">
  <!-- Back tag (offset slightly) -->
  <rect x="4" y="2" width="10" height="5" rx="1" fill="none" stroke="#2c3e50" stroke-width="1.5"/>
  <!-- Front tag -->
  <rect x="2" y="5" width="10" height="5" rx="1" fill="none" stroke="#2c3e50" stroke-width="1.5"/>
  <!-- Text lines on front tag -->
  <line x1="4" y1="7.5" x2="10" y2="7.5" stroke="#2c3e50" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="4" y1="12" x2="8" y2="12" stroke="#2c3e50" stroke-width="1.5" stroke-linecap="round"/>
</svg>
